services:
  db:
    image: postgres:15-alpine
    container_name: brain_tumor_db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-brain_tumor}
      POSTGRES_USER: ${POSTGRES_USER:-btuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-btpass}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-btuser}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brain_tumor_backend
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-btuser}:${POSTGRES_PASSWORD:-btpass}@db:5432/${POSTGRES_DB:-brain_tumor}
    volumes:
      - ./backend:/app
      - ./ml_pipeline:/ml_pipeline:ro
      - upload_data:/app/uploads
      - chroma_data:/app/chroma_db
      # brats 패키지가 호스트 Docker 데몬에 접근하기 위한 소켓 마운트
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  upload_data:
  chroma_data:
